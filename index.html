<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Active</title>
    <style>
        html {
    scroll-behavior: smooth;
}
        .btn {
    background: linear-gradient(90deg, #00ff88, #00bdff);
    color: #0d1117;
    padding: 15px 35px;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
    z-index: 20;
    position: relative;
}

.btn:hover {
    transform: scale(1.1); /* This creates the pop-up effect */
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
}

.btn:active {
    transform: scale(0.95); /* Adds a "click" feel */
}
        .typewriter {
    overflow: hidden; 
    border-right: .15em solid #00ff88; 
    white-space: nowrap; 
    margin: 0 auto; 
    letter-spacing: .15em; 
    animation: 
      typing 3.5s steps(40, end),
      blink-caret .75s step-end infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink-caret {
    from, to { border-color: transparent }
    50% { border-color: #00ff88; }
}
        body { 
            background: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), 
                        url('bg.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #58a6ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 50px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 450px;
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 0 0 10px 0;
        }

        p {
            color: #58a6ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(90deg, #00ff88, #00bdff);
            color: #0d1117;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="card">
        <section id="portfolio" style="height: 100vh; background: #0d1117; display: flex; justify-content: center; align-items: center; color: white;">
    <h2>DESIGN ARCHIVE</h2>
</section>
        <h1>SYSTEM ACTIVE</h1>
        <p class="typewriter">Precision build by Rizwan</p>
        
        <button class="btn" onclick="document.getElementById('portfolio').scrollIntoView({behavior: 'smooth'})">
            Initiate Protocol
        </button>
    </div>

    </body>
</html>
