<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Active | Portfolio</title>
    <style>
        .placeholder-box {
    width: 100%;
    height: 400px; /* Matches your project-card img height */
    display: flex;
    align-items: center;
    justify-content: center;
    background: #161b22;
    color: #00ff88;
    font-weight: bold;
    text-align: center;
}
    /* Replace your old CSS with this */
.portfolio-section {
    padding: 80px 20px;
    background: rgba(10, 10, 10, 0.9);
}

.section-title {
    color: #00ff88;
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 50px;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
}

.project-card {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(0, 255, 136, 0.2);
    transition: 0.4s;
}

/* This fixes the images and the empty branding boxes */
.project-card img, .placeholder-box {
    width: 100%;
    height: 400px; /* Uniform height for everything */
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.placeholder-box {
    background: #161b22;
    color: #00ff88;
    font-weight: bold;
    font-family: sans-serif;
}

.project-card:hover {
    transform: translateY(-15px);
    border-color: #00ff88;
    box-shadow: 0 20px 40px rgba(0, 255, 136, 0.2);
}
</style>
</head>
<body>
    
    <div class="card-container">
        <div class="card">
            <h1>SYSTEM ACTIVE</h1>
            <p class="typewriter">Precision build by Rizwan</p>
            <button class="btn" onclick="document.getElementById('portfolio').scrollIntoView({behavior: 'smooth'})">
                Initiate Protocol
            </button>
        </div>
    </div>
  <section id="portfolio" class="portfolio-section">
    <h2 class="section-title">DESIGN ARCHIVE</h2>
    <div class="gallery-grid">
        <div class="project-card"><img src="power-bank/powerbank1.jpg" alt="V1"></div>
        <div class="project-card"><img src="power-bank/powerbank2.jpg" alt="V2"></div>
        <div class="project-card"><img src="power-bank/powerbank3.jpg" alt="V3"></div>
        <div class="project-card"><img src="power-bank/powerbank4.jpg" alt="V4"></div>
        
        <div class="project-card">
            <div class="placeholder-box">BRANDING ASSETS</div>
        </div>
        <div class="project-card">
            <div class="placeholder-box">UI CONCEPT</div>
        </div>
    </div>
</section>
</body>
</html>
