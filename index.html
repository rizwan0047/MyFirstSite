        /* --- POWERBANK GRID STYLES --- */
.portfolio-section {
    padding: 60px 20px;
    display: flex;
    justify-content: center;
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
    width: 100%;
    max-width: 1200px;
}

.project-card {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(0, 255, 136, 0.2);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.project-card img {
    width: 100%;
    height: 320px; /* Keeps them uniform */
    object-fit: cover;
    display: block;
}

.project-card:hover {
    transform: translateY(-15px) scale(1.02);
    border-color: #00ff88;
    box-shadow: 0 20px 40px rgba(0, 255, 136, 0.15);
}

        html {
            scroll-behavior: smooth;
        }

        /* 1. BODY FIX: Changed flex to block to allow vertical stacking */
        body { 
            background: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), 
                        url('bg.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #58a6ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: block; /* Required to stack sections */
            width: 100%;
            overflow-x: hidden; /* Prevents side-scrolling */
            overflow-y: auto;   /* Enables downward scrolling */
        }

        /* 2. CARD FIX: Centers content within the first 100vh view */
        .card-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 50px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 450px;
            z-index: 10;
        }

        .btn {
            background: linear-gradient(90deg, #00ff88, #00bdff);
            color: #0d1117;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            z-index: 20;
            position: relative;
        }

        .btn:hover {
            transform: scale(1.1); 
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .typewriter {
            overflow: hidden; 
            border-right: .15em solid #00ff88; 
            white-space: nowrap; 
            margin: 0 auto; 
            letter-spacing: .15em; 
            animation: 
              typing 3.5s steps(40, end),
              blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00ff88; }
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 0 0 10px 0;
        }

        p {
            color: #58a6ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
