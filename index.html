<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Active</title>
    <style>
       body { 
            background: linear-gradient(rgba(13, 17, 23, 0.8), rgba(13, 17, 23, 0.8)), 
                        url('bg.png'); 
            background-size: cover;
            background-position: center;
            color: #58a6ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 60px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin-bottom: 10px;
        }

        .btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(90deg, #00ff88, #00bdff);
            color: #0d1117;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="card">
        </div>
</body>
</html>
