<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Active | Portfolio</title>
    <style>
        .placeholder-box {
    width: 100%;
    height: 400px; /* This prevents the "flat line" look */
    display: flex;
    align-items: center;
    justify-content: center;
    background: #161b22;
    color: #00ff88;
    font-weight: bold;
    text-align: center;
}
        /* --- 1. GLOBAL & BACKGROUND --- */
        html { scroll-behavior: smooth; }
        body { 
            background: linear-gradient(rgba(13, 17, 23, 0.9), rgba(13, 17, 23, 0.9)), url('bg.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #58a6ff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; 
        }

        /* --- 2. HERO SECTION --- */
        .card-container { 
            height: 100vh; display: flex; justify-content: center; align-items: center; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 50px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 450px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        h1 { font-size: 2.8rem; color: #fff; text-shadow: 0 0 20px rgba(0, 255, 136, 0.6); margin: 0; }
        .typewriter { margin-bottom: 20px; font-size: 1.1rem; color: #58a6ff; }

        /* --- 3. BUTTONS --- */
        .btn {
            background: linear-gradient(90deg, #00ff88, #00bdff); color: #0d1117;
            padding: 15px 35px; border: none; border-radius: 50px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(0, 255, 136, 0.6); }

        /* --- 4. PORTFOLIO GRID --- */
        .portfolio-section { padding: 100px 20px; text-align: center; background: rgba(10, 10, 10, 0.4); }
        .section-title { color: #00ff88; font-size: 2.5rem; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 2px; }
        
        .gallery-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1200px; margin: 0 auto; 
        }

        .project-card {
            background: rgba(255, 255, 255, 0.03); border-radius: 20px; overflow: hidden;
            border: 1px solid rgba(0, 255, 136, 0.2); transition: 0.4s;
        }
        .project-card:hover { transform: translateY(-15px); border-color: #00ff88; box-shadow: 0 20px 40px rgba(0, 255, 136, 0.2); }

        .project-card img, .placeholder-box { width: 100%; height: 400px; object-fit: cover; display: block; }
        
        .placeholder-box { 
            display: flex; align-items: center; justify-content: center; 
            background: #161b22; color: #00ff88; font-weight: bold; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card">
            <h1>SYSTEM ACTIVE</h1>
            <p class="typewriter">Precision build by Rizwan</p>
            <button class="btn" onclick="document.getElementById('portfolio').scrollIntoView({behavior: 'smooth'})">
                Initiate Protocol
            </button>
        </div>
    </div>

    <section id="portfolio" class="portfolio-section">
        <h2 class="section-title">DESIGN ARCHIVE</h2>
        <div class="gallery-grid">
            <div class="project-card"><img src="power-bank/powerbank1.jpg" alt="V1"></div>
            <div class="project-card"><img src="power-bank/powerbank2.jpg" alt="V2"></div>
            <div class="project-card"><img src="power-bank/powerbank3.jpg" alt="V3"></div>
            <div class="project-card"><img src="power-bank/powerbank4.jpg" alt="V4"></div>
            
            <div class="project-card">
                <div class="placeholder-box">BRANDING ASSETS</div>
            </div>
            <div class="project-card">
                <div class="placeholder-box">UI CONCEPT</div>
            </div>
        </div>
    </section>

</body>
</html>
