<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Active</title>
    <style>
        body { 
    background: linear-gradient(rgba(13, 17, 23, 0.8), rgba(13, 17, 23, 0.8)), 
                url('bg.jpg'); 
    background-size: cover;
    background-position: center;
    color: #58a6ff; 
    font-family: sans-serif; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
    overflow: hidden;
}
        @media (max-width: 600px) {
    .card {
        padding: 30px;
        width: 80%; /* Shrinks the card to fit small screens */
        border-radius: 16px;
    }
    
    h1 {
        font-size: 1.5rem; /* Reduces text size for mobile */
        letter-spacing: 2px;
    }
}
        body { background: #0d1117; color: #58a6ff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0 }
        .card
         {
    /* ... keep your existing card code and add this line ... */
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}

.card:hover {
    transform: translateY(-10px); /* Lifts the card up */
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); /* Deepens the shadow */
    border: 1px solid rgba(255, 255, 255, 0.2); /* Brightens the edge */
}
.btn {
    margin-top: 25px;
    padding: 12px 30px;
    background: linear-gradient(90deg, #00ff88, #00bdff);
    color: #0d1117;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
}

.btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
    letter-spacing: 1px;
}
        h1 { 
    color: #00ff88; 
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.7), 
                 0 0 20px rgba(0, 255, 136, 0.5);
    transition: 0.3s;
}

h1:hover {
    color: #ffffff;
    text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
    cursor: default;
}
    </style>
</head>
<body>
    <div class="card">
        </div>
</body>
</html>
