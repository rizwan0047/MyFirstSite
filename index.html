<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Active</title>
    <style>
        .portfolio-section {
    padding: 80px 20px;
    background: rgba(0, 0, 0, 0.8); /* Dark background to make posters pop */
}

.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
}

.project-card img {
    width: 100%;
    border-radius: 15px;
    border: 2px solid #00ff88; /* Neon border to match your vibe */
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
}
        .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
    width: 90%;
    max-width: 1200px;
}

.project-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    position: relative;
}

/* The Awesome Hover Effect */
.project-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: #00ff88;
    box-shadow: 0 20px 40px rgba(0, 255, 136, 0.2);
    background: rgba(255, 255, 255, 0.07);
}

.project-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.8;
    transition: 0.4s;
}

.project-card:hover img {
    opacity: 1;
}
        html {
            scroll-behavior: smooth;
        }

        /* 1. BODY FIX: Changed flex to block to allow vertical stacking */
        body { 
            background: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), 
                        url('bg.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #58a6ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: block; /* Required to stack sections */
            width: 100%;
            overflow-x: hidden; /* Prevents side-scrolling */
            overflow-y: auto;   /* Enables downward scrolling */
        }

        /* 2. CARD FIX: Centers content within the first 100vh view */
        .card-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 50px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 450px;
            z-index: 10;
        }

        .btn {
            background: linear-gradient(90deg, #00ff88, #00bdff);
            color: #0d1117;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            z-index: 20;
            position: relative;
        }

        .btn:hover {
            transform: scale(1.1); 
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .typewriter {
            overflow: hidden; 
            border-right: .15em solid #00ff88; 
            white-space: nowrap; 
            margin: 0 auto; 
            letter-spacing: .15em; 
            animation: 
              typing 3.5s steps(40, end),
              blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #00ff88; }
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 0 0 10px 0;
        }

        p {
            color: #58a6ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    
    <div class="card-container">
        <div class="card">
            <h1>SYSTEM ACTIVE</h1>
            <p class="typewriter">Precision build by Rizwan</p>
            <button class="btn" onclick="document.getElementById('portfolio').scrollIntoView({behavior: 'smooth'})">
                Initiate Protocol
            </button>
        </div>
    </div>

    <section id="portfolio" style="min-height: 100vh; width: 100%; background: rgba(13, 17, 23, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0;">
        <h2 style="color: #00ff88; text-shadow: 0 0 15px rgba(0, 255, 136, 0.6); font-size: 2.5rem; margin-bottom: 30px;">DESIGN ARCHIVE</h2>
        <div class="gallery-grid">
    <div class="project-card">
        <div style="height: 250px; display: flex; align-items: center; justify-content: center; background: #161b22;">
            <p>POSTER DESIGN 01</p> 
            </div>
    </div>

    <div class="project-card">
        <div style="height: 250px; display: flex; align-items: center; justify-content: center; background: #161b22;">
            <p>BRANDING ASSETS</p>
        </div>
    </div>

    <div class="project-card">
        <div style="height: 250px; display: flex; align-items: center; justify-content: center; background: #161b22;">
            <p>UI CONCEPT</p>
        </div>
    </div>
</div>
        <div style="width: 85%; max-width: 1200px; height: 400px; border: 2px dashed rgba(88, 166, 255, 0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #58a6ff;">
            <p>Project Grid Loading...</p>
        </div>
        <section id="portfolio" class="portfolio-section">
    <div class="gallery-grid">
        <div class="project-card"><img src="power-bank/powerbank1.jpg"></div>
        <div class="project-card"><img src="power-bank/powerbank2.jpg"></div>
        <div class="project-card"><img src="power-bank/powerbank3.jpg"></div>
        <div class="project-card"><img src="power-bank/powerbank4.jpg"></div>
    </div>
</section>
    </section>
</body>
</html>
