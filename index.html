<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Active | Portfolio</title>
    <style>
        /* --- GLOBAL & CORE LAYOUT --- */
        html {
            scroll-behavior: smooth;
        }

        body { 
            background: linear-gradient(rgba(13, 17, 23, 0.9), rgba(13, 17, 23, 0.9)), 
                        url('bg.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #58a6ff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: block; 
            width: 100%;
            overflow-x: hidden;
        }

        /* --- HERO SECTION --- */
        .card-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 50px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 450px;
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 0 0 10px 0;
        }

        .typewriter {
            overflow: hidden; 
            border-right: .15em solid #00ff88; 
            white-space: nowrap; 
            margin: 0 auto 30px auto; 
            letter-spacing: .15em; 
            animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
        }

        .btn {
            background: linear-gradient(90deg, #00ff88, #00bdff);
            color: #0d1117;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1); 
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.6);
        }

        /* --- PORTFOLIO SECTION --- */
        .portfolio-section {
            padding: 100px 20px;
            background: rgba(10, 10, 10, 0.5);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .project-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            opacity: 0.9;
            transition: 0.4s;
        }

        .project-card:hover {
            transform: translateY(-15px);
            border-color: #00ff88;
            box-shadow: 0 20px 40px rgba(0, 255, 136, 0.2);
        }

        .project-card:hover img {
            opacity: 1;
        }

        /* --- ANIMATIONS --- */
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff88; } }
    </style>
</head>
<body>
    
    <div class="card-container">
        <div class="card">
            <h1>SYSTEM ACTIVE</h1>
            <p class="typewriter">Precision build by Rizwan</p>
            <button class="btn" onclick="document.getElementById('portfolio').scrollIntoView({behavior: 'smooth'})">
                Initiate Protocol
            </button>
        </div>
    </div> <section id="portfolio" class="portfolio-section">
        <div class="gallery-grid">
            <div class="project-card"><img src="power-bank/powerbank1.jpg" alt="View 1"></div>
            <div class="project-card"><img src="power-bank/powerbank2.jpg" alt="View 2"></div>
            <div class="project-card"><img src="power-bank/powerbank3.jpg" alt="View 3"></div>
            <div class="project-card"><img src="power-bank/powerbank4.jpg" alt="View 4"></div>
        </div>
    </section>

</body>
</html>
