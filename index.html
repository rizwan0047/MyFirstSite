<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Active</title>
    <style>
        body { 
            background: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), 
                        url('bg.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #58a6ff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        .card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 50px; 
            border-radius: 24px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 450px;
            z-index: 10;
        }

        h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin: 0 0 10px 0;
        }

        p {
            color: #58a6ff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(90deg, #00ff88, #00bdff);
            color: #0d1117;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>SYSTEM ACTIVE</h1>
        <p>Precision build by Rizwan</p>
        <button class="btn">Initiate Protocol</button>
    </div>
</body>
</html>
